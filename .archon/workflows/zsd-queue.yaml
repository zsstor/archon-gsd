name: gsd-queue
description: |
  Use when: Planning future milestones — write milestone-context files with depends_on
  ordering so they're ready to pick up after the current milestone ships. Maps to
  GSD-2's /gsd2-queue.
  Triggers: "queue next milestone", "gsd queue v2.1", "write milestone context".
  NOT for: Starting an active milestone (use gsd-new-milestone).

  Writes milestone-context files for future milestones without committing to phase
  breakdowns yet. Dependencies are declared so the milestone-audit tooling can flag
  blockers before a milestone becomes active.

  Input: Free-text description of the future milestone, optional depends_on.

provider: claude

nodes:
  - id: understand
    model: sonnet
    prompt: |
      # GSD Queue — Understand Future Milestone

      **Input**: $ARGUMENTS

      ## Step 1: Load current state

      ```bash
      cat .planning/PROJECT.md 2>/dev/null
      cat .planning/ROADMAP.md 2>/dev/null
      ls -1 .planning/milestones/ 2>/dev/null
      ```

      ## Step 2: Parse the input

      The user described a future milestone. Identify:
      - Proposed version (e.g., "v2.1", "v3.0") — infer from current versions if not given
      - Intent (one sentence)
      - Likely dependencies on other milestones (current, queued, or hypothetical)

      ## Step 3: Ask for disambiguation if needed (non-interactive — best-effort inference)

      If the input is too vague, make your best inference and note the assumptions
      clearly in the context file. This is a queue entry, not an active milestone —
      precision can wait until gsd-new-milestone runs.

  - id: write
    model: sonnet
    depends_on: [understand]
    prompt: |
      # GSD Queue — Write Milestone Context

      **Input**: $ARGUMENTS
      **Understanding**: $understand.output

      ## Step 1: Pick version

      Derive the version. Existing milestones in `.planning/milestones/` show what's
      already used; pick the next reasonable version.

      ## Step 2: Write MILESTONE-CONTEXT.md

      Location: `.planning/milestones/queued/{version}-CONTEXT.md`

      ```bash
      mkdir -p .planning/milestones/queued
      ```

      Content:

      ```markdown
      # Queued Milestone: {version}

      **Queued**: {ISO date}
      **Status**: queued (not active)

      ## Intent

      {one or two sentences describing what this milestone delivers}

      ## Depends On

      Milestones that must ship before this one is viable:
      - {version} — {one-line why}
      - {version} — {one-line why}

      ## Motivating Context

      {the context, trigger, or stakeholder ask that produced this entry — preserves
      the "why" so a future `gsd-new-milestone` run has context}

      ## Candidate Scope

      Rough outline — NOT binding. Final scope is set by gsd-new-milestone requirements.
      - {capability}
      - {capability}

      ## Known Constraints

      - {constraint or risk we already know about}

      ## Assumptions Made During Queueing

      - {assumption — flag for verification at milestone activation}

      ## Expected Trigger

      When this milestone becomes active:
      - {signal or event that should cause us to activate}

      ## Notes

      {any other relevant notes — references to Slack threads, docs, etc.}
      ```

      ## Step 3: Update ROADMAP.md with a "Queued" section

      If the top-level `.planning/ROADMAP.md` doesn't have a `## Queued Milestones`
      section, add one. Append:

      ```markdown
      - **{version}** — {intent} — queued {ISO date} — [context](./milestones/queued/{version}-CONTEXT.md)
      ```

      ## Step 4: Commit

      ```bash
      git add .planning/
      git commit -m "chore(planning): queue milestone ${version}"
      ```

      ## Step 5: Output

      ```
      ## Milestone Queued

      **Version**: {version}
      **File**: .planning/milestones/queued/{version}-CONTEXT.md
      **Depends on**: {count} prior milestones

      When ready to activate:
      archon workflow run gsd-new-milestone "{version} — {intent}"
      ```
